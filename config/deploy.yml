service: peregrino
image: saramic/peregrino

servers:
  web:
    - <%= ENV["PEREGRINO_IP"] %>

ssh:
  user: ubuntu
  keys:
    - <%= ENV["PEREGRINO_PEM_LOCATION"] %>

registry:
  server: ghcr.io
  username: saramic
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
    - POSTGRES_PASSWORD
  clear:
    SOLID_QUEUE_IN_PUMA: "true"

# PostgreSQL running as a container on the same instance.
# Bound to 127.0.0.1 so it is not exposed to the internet.
accessories:
  db:
    image: postgres:17
    host: <%= ENV["PEREGRINO_IP"] %>
    port: "127.0.0.1:5432:5432"
    env:
      secret:
        - POSTGRES_PASSWORD
      clear:
        POSTGRES_DB: peregrino_production
        POSTGRES_USER: postgres
    directories:
      - data:/var/lib/postgresql/data

volumes:
  - "peregrino_storage:/rails/storage"

asset_path: /rails/public/assets

builder:
  arch: amd64

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell:   app exec --interactive --reuse "bash"
  logs:    app logs -f
  dbc:     app exec --interactive --reuse "bin/rails dbconsole --include-password"
