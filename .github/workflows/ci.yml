name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: peregrino_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/peregrino_test
      RAILS_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Mise disable idiomatic version file
        run: |
          mise settings add idiomatic_version_file_enable_tools "[]"

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare test database
        run: bin/rails db:schema:load

      - name: Check
        run: make check
