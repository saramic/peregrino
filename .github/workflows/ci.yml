name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Mise disable idiomatic version file
        run: |
          mise settings add idiomatic_version_file_enable_tools "[]"

      - name: Check
        run: make check
